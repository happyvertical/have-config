name: Commitlint

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: Validate conventional commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # SHAs are hex so safe to interpolate, but use env vars per
          # GitHub Actions injection-defense guidance.
          COMMITS=$(git log --format=%s "$BASE_SHA".."$HEAD_SHA")

          # Escape `%`, CR, LF in user-controlled commit messages
          # before printing inside `::error::` workflow commands. Per
          # GitHub's workflow-commands docs, unescaped event-payload
          # strings can corrupt the command payload or inject
          # additional workflow commands via `%`, `\r`, or `\n` in
          # the source string.
          escape_wc() {
            local s="$1"
            s="${s//%/%25}"
            s="${s//$'\r'/%0D}"
            s="${s//$'\n'/%0A}"
            printf '%s' "$s"
          }

          FAILED=0
          while IFS= read -r msg; do
            [[ -z "$msg" ]] && continue
            # Allow merge commits
            if [[ "$msg" =~ ^Merge\  ]]; then
              continue
            fi
            # Scope grammar:
            #   scope    = segment ("," segment)*
            #   segment  = [a-z0-9] ([a-z0-9/-]* [a-z0-9])?
            # Each comma-separated segment must start AND end with an
            # alphanumeric character. A single alphanumeric is a valid
            # segment. Forward slash and hyphen are allowed only
            # BETWEEN alphanumerics within a segment, never at the
            # boundary. Tokenizing rejects malformed scopes like
            # `fix(a,):`, `fix(a/):`, `fix(a,,b):`, `fix(a-):`,
            # `fix(,b):`, and `fix(/foo):` that a looser pattern
            # would accept.
            if ! printf '%s' "$msg" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\([a-z0-9]([a-z0-9/-]*[a-z0-9])?(,[a-z0-9]([a-z0-9/-]*[a-z0-9])?)*\))?!?: .+'; then
              msg_escaped=$(escape_wc "$msg")
              echo "::error::Invalid commit message: $msg_escaped"
              echo "  Expected format: type(scope?): subject"
              echo "  Valid types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert"
              echo "  Scope chars: alphanumeric, hyphen, comma (multi-scope), forward slash (e.g. dep names)"
              FAILED=1
            fi
          done <<< "$COMMITS"

          if [[ "$FAILED" -eq 1 ]]; then
            echo ""
            echo "See https://www.conventionalcommits.org/ for the full spec."
            exit 1
          fi

          echo "✓ All commits follow Conventional Commits format."
