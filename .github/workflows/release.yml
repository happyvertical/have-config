name: Release

on:
  push:
    branches:
      - main
  # Recovery path for partial publish failures. If `pnpm
  # changeset:publish` fails after the version commit was already
  # pushed (network glitch, registry outage, transient auth), the
  # version bump is on main but packages aren't published. Re-running
  # this workflow via the push event would either be skipped by the
  # chore(release) guard or hit the main-advanced check. Operators
  # can instead trigger `workflow_dispatch` with mode=publish-only to
  # check out current main and run just `changeset publish`.
  workflow_dispatch:
    inputs:
      mode:
        description: 'release flow mode'
        type: choice
        options:
          - auto         # normal: auto-changeset → version → commit → push → publish
          - publish-only # recovery: skip auto-changeset and version; just publish from current main
        default: auto

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write    # publish to GitHub Packages

jobs:
  release:
    name: Direct-publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip the workflow's own chore(release) push commits during the
    # `push` event. Without this guard, every release commit would
    # trigger another (no-op) run. workflow_dispatch invocations are
    # never skipped — that's the recovery path.
    if: ${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      # Mint a token from the HAVE_RELEASE GitHub App (org-wide secret
      # pair). Used as GITHUB_TOKEN (for the chore(release) push back to
      # main) and NODE_AUTH_TOKEN (for `changeset publish` to
      # npm.pkg.github.com). Same pattern as smrt.
      - name: Generate token from GitHub App
        id: token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.HAVE_RELEASE_APP_ID }}
          private_key: ${{ secrets.HAVE_RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@happyvertical'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ steps.token.outputs.token }}
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          # Use a neutral bot identity so commits clearly attribute to the
          # release workflow, not a person. Email format matches GitHub's
          # noreply pattern for bots.
          git config user.name "have-release-bot"
          git config user.email "have-release[bot]@users.noreply.github.com"

      - name: Auto-changeset, version, commit, push, then publish
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'auto' }}
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          NODE_AUTH_TOKEN: ${{ steps.token.outputs.token }}
          NPM_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail

          # 0. Refuse to start if a previous release didn't complete
          #    its tag push. Symptom: an untagged `chore(release): bump`
          #    commit sits between the last `@happyvertical/*@*` tag
          #    and HEAD. If we proceeded, `auto-changeset` would scan
          #    `LAST_TAG..HEAD`, filter out the chore commit, and
          #    re-include the commits that were already published —
          #    causing a duplicate release with duplicated changelog
          #    entries. Operator resolution: hand-push the missing
          #    per-package tags for the already-published versions,
          #    then re-run this workflow.
          #
          #    Detector intentionally narrowed to `bump ` (the
          #    version-bump message format). The cleanup path below
          #    creates `chore(release): clean up consumed no-op
          #    changesets` commits which are NOT failed releases —
          #    matching them here would self-block every future run
          #    after any no-op cleanup ever lands on main.
          LAST_PKG_TAG=$(git tag --list '@happyvertical/*@*' --sort=-creatordate | head -1 || true)
          if [ -n "$LAST_PKG_TAG" ]; then
            UNTAGGED_RELEASE=$(git log "$LAST_PKG_TAG..HEAD" --pretty=%H --grep='^chore(release): bump ' | head -1)
            if [ -n "$UNTAGGED_RELEASE" ]; then
              echo "::error::Found untagged chore(release): bump commit $UNTAGGED_RELEASE since last per-package tag $LAST_PKG_TAG."
              echo "::error::This indicates the previous release published packages but failed to push tags. Resolve manually: push the missing per-package tags for the published versions, then re-run."
              exit 1
            fi
          fi

          # 1. Generate a changeset from conventional commits since the
          #    last release (or defer if a manual changeset is present).
          pnpm changeset:auto

          # 2. Apply changesets — bumps package.json files + writes
          #    CHANGELOG.md entries + deletes consumed .changeset/*.md.
          pnpm changeset:version

          # 3. Gate on whether any package.json version actually
          #    changed. Scoping the diff to `packages/*/package.json`
          #    (rather than the whole working tree) catches both:
          #    - subset bumps (manual changeset for only one package
          #      bumps that one's package.json; the old single-package
          #      gate for eslint-config would have skipped)
          #    - empty changesets (a manual `---\n---` changeset
          #      causes `changeset version` to delete the file but
          #      not bump any package.json; a working-tree-wide gate
          #      would have committed the deletion + run publish as
          #      a no-op + advanced no tag, leaving the next auto
          #      run to re-include the same commits)
          if git diff --quiet -- 'packages/*/package.json' \
            && git diff --cached --quiet -- 'packages/*/package.json'; then
            # No package bumped — but `changeset:version` may have
            # consumed (deleted) a manual no-op changeset. If we exit
            # here without committing that deletion, the no-op
            # changeset stays on origin/main, and EVERY future push
            # repeats the same no-op cycle, silently blocking real
            # releases until someone notices and deletes it by hand.
            # Push the cleanup commit so the blocker is gone.
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "No package bumps but tree changed — committing cleanup of consumed no-op changesets."
              git add -A
              git commit -m "chore(release): clean up consumed no-op changesets"
              git fetch origin +refs/heads/main:refs/remotes/origin/main
              if [ "$(git rev-parse origin/main)" != "$(git rev-parse HEAD~1)" ]; then
                echo "::error::origin/main advanced during this run — aborting cleanup push."
                exit 1
              fi
              git push origin main
            fi
            echo "No package.json bumps after changeset:version — nothing to publish."
            exit 0
          fi

          # Identify which packages actually bumped this run. Used
          # both for logging and for the commit message — naming a
          # specific version (like `v$ESLINT_VERSION`) would be wrong
          # for subset releases via manual changesets that bump only
          # one or two packages. Per-package versions live in the
          # tags created by `changeset publish`.
          BUMPED=$(git diff --name-only -- 'packages/*/package.json' \
            | sed 's|packages/\(.*\)/package.json|\1|' \
            | paste -sd ',' -)
          echo "Bumped packages: $BUMPED"

          # 4. Commit the version bumps + changelog entries. The chore
          #    prefix matches what the job-level `if:` guard filters.
          git add -A
          git commit -m "chore(release): bump $BUMPED"

          # 5. Verify main hasn't moved out from under us, then push
          #    the commit BEFORE publishing. Order matters: if publish
          #    runs first and then the push fails (because main
          #    advanced mid-job), we get registry/git drift — registry
          #    has the new versions, main doesn't have the bump
          #    commit, and the next run tries to republish.
          #
          #    Push order: commit first, then publish, then tags.
          #    `changeset:publish` creates per-package tags locally;
          #    we push them afterwards.
          # Explicit destination refspec — `git fetch origin main` with
          # a source-only refspec is config-dependent: under some setups
          # (custom refspecs, partial/shallow clones) it only updates
          # FETCH_HEAD, not `refs/remotes/origin/main`. The `+` forces
          # the remote-tracking branch to update non-fast-forward too.
          git fetch origin +refs/heads/main:refs/remotes/origin/main
          if [ "$(git rev-parse origin/main)" != "$(git rev-parse HEAD~1)" ]; then
            echo "::error::origin/main advanced during this run. Aborting before publish to avoid registry/git drift. The next push to main will re-run and pick up the new state."
            exit 1
          fi
          git push origin main

          # 6. Publish to GitHub Packages. changeset:publish also
          #    creates per-package git tags (e.g.
          #    `@happyvertical/eslint-config@0.2.0`). If publish
          #    partially fails, the commit is already on main so
          #    state is at least consistent. Recovery: re-trigger this
          #    workflow with workflow_dispatch + mode=publish-only.
          #    Versions already published are idempotent under
          #    `changeset publish`.
          pnpm changeset:publish

          # 7. Push the per-package tags created by changeset:publish.
          #    Push tags only — main was already pushed at step 5 before
          #    publish ran. Pushing `main` again here would fail with a
          #    non-fast-forward rejection if any other commit landed in
          #    the interval, AFTER packages have already been published
          #    to the registry. That'd leave registry/git drift the
          #    publish-only recovery path is meant to avoid.
          git push origin --tags

      - name: Publish only (recovery from partial publish failure)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'publish-only' }}
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          NODE_AUTH_TOKEN: ${{ steps.token.outputs.token }}
          NPM_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail

          # Recovery path: a previous auto run committed + pushed the
          # version bump but `changeset publish` failed before
          # completing (network glitch, registry outage). We're now
          # on current main, which contains the unpublished version
          # bumps. Run publish only — no auto-changeset, no
          # changeset:version (those already happened on the failed
          # run). `changeset publish` is idempotent for versions
          # already on the registry; it only attempts unpublished
          # versions.

          # Guard: refuse to publish unless HEAD is the failed release's
          # `chore(release):` commit AND nothing new has landed on
          # origin/main. Without this, recovery could publish stale
          # version numbers from `R` (the failed release commit) with
          # the source tree of any later commit `N` that landed in the
          # meantime — the registry artifact would silently contain
          # post-version-commit code. Recovery is only safe immediately
          # after a failed publish, before any new commits land.
          # Explicit destination refspec — see auto path above for why
          # `git fetch origin main` alone is not reliable for updating
          # `refs/remotes/origin/main` under all configurations.
          git fetch origin +refs/heads/main:refs/remotes/origin/main
          HEAD_MSG=$(git log -1 --pretty=%s HEAD)
          if ! printf '%s' "$HEAD_MSG" | grep -q '^chore(release):'; then
            # Escape `%`, CR, LF before embedding user-controlled commit
            # subject in a workflow command — per GitHub's
            # workflow-commands docs, those bytes can corrupt the
            # command payload or inject additional commands.
            HEAD_MSG_ESCAPED="${HEAD_MSG//%/%25}"
            HEAD_MSG_ESCAPED="${HEAD_MSG_ESCAPED//$'\r'/%0D}"
            HEAD_MSG_ESCAPED="${HEAD_MSG_ESCAPED//$'\n'/%0A}"
            echo "::error::Recovery requires HEAD to be a chore(release): commit. HEAD subject is: $HEAD_MSG_ESCAPED"
            echo "::error::If the failed release commit is no longer at HEAD, resolve manually — do not use this recovery path."
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "::error::origin/main has advanced past HEAD. Recovery would publish the wrong tree."
            echo "::error::Resolve manually (e.g. revert the new commits, or hand-publish from a clean checkout of the failed release commit)."
            exit 1
          fi

          echo "Recovery mode: running changeset:publish against current main ($(git rev-parse --short HEAD))."
          pnpm changeset:publish

          # Repair tags for packages whose versions are already
          # published but missing local tags. In a partial failure, the
          # first run can succeed publishing + locally tagging some
          # packages before erroring out — those local tags die with
          # the runner. On recovery, `changeset publish` skips
          # already-published versions (correctly idempotent), so the
          # tags are never recreated by publish alone. `changeset tag`
          # reads package.json versions and creates any missing tags;
          # without it, `git push --tags` would push nothing for those
          # packages and the next auto run's tag-based release boundary
          # would scan too far back and double-include old commits.
          pnpm changeset tag

          # Push tags only — recovery never touches the main branch
          # ref. The release commit was already pushed by the failed
          # auto run; pushing main again here would only succeed if
          # main hadn't advanced (which our guard above already
          # ensures), so it'd be redundant. Explicit tag-only push
          # keeps the intent clear.
          git push origin --tags
