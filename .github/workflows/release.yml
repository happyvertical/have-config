name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write    # publish to GitHub Packages

jobs:
  release:
    name: Direct-publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip the workflow's own chore(release) commits. Without this guard,
    # every release commit would trigger another (no-op) run. The
    # auto-changeset script would catch it too, but skipping at job level
    # saves the runner.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      # Mint a token from the HAVE_RELEASE GitHub App (org-wide secret
      # pair). Used as GITHUB_TOKEN (for the chore(release) push back to
      # main) and NODE_AUTH_TOKEN (for `changeset publish` to
      # npm.pkg.github.com). Same pattern as smrt.
      - name: Generate token from GitHub App
        id: token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.HAVE_RELEASE_APP_ID }}
          private_key: ${{ secrets.HAVE_RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@happyvertical'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ steps.token.outputs.token }}
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          # Use a neutral bot identity so commits clearly attribute to the
          # release workflow, not a person. Email format matches GitHub's
          # noreply pattern for bots.
          git config user.name "have-release-bot"
          git config user.email "have-release[bot]@users.noreply.github.com"

      - name: Auto-changeset, version, commit, push, then publish
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          NODE_AUTH_TOKEN: ${{ steps.token.outputs.token }}
          NPM_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail

          # 1. Generate a changeset from conventional commits since the
          #    last release (or defer if a manual changeset is present).
          pnpm changeset:auto

          # 2. Apply changesets — bumps package.json files + writes
          #    CHANGELOG.md entries + deletes consumed .changeset/*.md.
          pnpm changeset:version

          # 3. Gate on whether anything actually changed. Using the
          #    working tree (not a single package's version) catches
          #    every case: auto-generated bumps to all packages,
          #    manual changesets that bump only one package, no-op
          #    runs where nothing was releasable. Avoids the
          #    single-package gate trap (manual changeset for only
          #    prettier-config would have skipped publish under the
          #    old eslint-only check).
          if git diff --quiet && git diff --cached --quiet; then
            echo "No releasable changes after changeset:version — nothing to publish."
            exit 0
          fi

          # Use eslint-config as a representative version for logging.
          # All publishable packages bump together under auto-changeset
          # (manual changesets may bump a subset).
          AFTER=$(node -p "require('./packages/eslint-config/package.json').version")
          echo "Releasing version $AFTER"

          # 4. Commit the version bumps + changelog entries. The chore
          #    prefix matches what the job-level `if:` guard filters.
          git add -A
          git commit -m "chore(release): v$AFTER"

          # 5. Verify main hasn't moved out from under us, then push
          #    the commit BEFORE publishing. Order matters: if publish
          #    runs first and then the push fails (because main
          #    advanced mid-job), we get registry/git drift — registry
          #    has the new versions, main doesn't have the bump
          #    commit, and the next run tries to republish.
          #
          #    Push order: commit first, then publish, then tags.
          #    `changeset:publish` creates per-package tags locally;
          #    we push them afterwards.
          git fetch origin main
          if [ "$(git rev-parse origin/main)" != "$(git rev-parse HEAD~1)" ]; then
            echo "::error::origin/main advanced during this run. Aborting before publish to avoid registry/git drift. The next push to main will re-run and pick up the new state."
            exit 1
          fi
          git push origin main

          # 6. Publish to GitHub Packages. changeset:publish also
          #    creates per-package git tags (e.g.
          #    `@happyvertical/eslint-config@0.2.0`). If publish
          #    partially fails, the commit is already on main so
          #    state is at least consistent; manual rerun of publish
          #    can recover (idempotent for already-published versions).
          pnpm changeset:publish

          # 7. Push the per-package tags created by changeset:publish.
          git push --tags origin main
